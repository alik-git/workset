name: Checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Ruff
        run: python -m pip install ruff==0.15.9

      - name: Ruff format
        run: python -m ruff format --check --diff .

      - name: Ruff lint
        run: python -m ruff check --output-format=full .

  python-checks:
    name: Ruff + Mypy + Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff format
        run: python -m ruff format --check --diff .

      - name: Ruff lint
        run: python -m ruff check --output-format=full .

      - name: Mypy static type checks
        run: python -m mypy

      - name: Pytest tests
        run: python -m pytest

  package-pip:
    name: Package Build (pip)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build package
        run: python -m build

      - name: Install built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Smoke test installed package
        run: python -c "import workset; print(workset.do_useful_thing())"

  package-uv:
    name: Package Build (uv)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Python dependencies
        run: uv sync --extra dev --locked

      - name: Build package
        run: uv build

      - name: Install built wheel
        run: uv pip install --force-reinstall dist/*.whl

      - name: Smoke test installed package
        run: uv run python -c "import workset; print(workset.do_useful_thing())"
